<svg width="260" height="220" viewBox="0 0 260 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="aegisHomeLogoTitle">
    <title id="aegisHomeLogoTitle">AegisHome security alarm logo</title>

    <defs>
